// ─── 單字列 ─────────────────────────────────────────────────
const WordRow = ({ word, onArchive, onClick, isArchiveView }) => {
  const [offset, setOffset] = useState(0);
  const [dragging, setDragging] = useState(false);
  const [startX, setStartX] = useState(0);

  const start = (x) => { if (isArchiveView) return; setStartX(x); setDragging(true); };
  const move  = (x) => { if (!dragging) return; const d = x - startX; if (d < 0) setOffset(Math.max(d, -160)); };
  const end   = ()  => {
    if (!dragging) return;
    if (offset < -100) onArchive(word.id);
    setOffset(0); setDragging(false);
  };

  const pct = Math.min(Math.abs(offset) / 100, 1);

  return (
    <div className="relative overflow-hidden border-b border-slate-50"
      style={{ background: `rgba(16,185,129,${pct * 0.9})` }}
      onMouseDown={e => start(e.clientX)} onMouseMove={e => move(e.clientX)} onMouseUp={end} onMouseLeave={end}
      onTouchStart={e => start(e.touches[0].clientX)} onTouchMove={e => { e.preventDefault(); move(e.touches[0].clientX); }} onTouchEnd={end}
    >
      <div className="absolute inset-0 flex items-center justify-end pr-8 pointer-events-none">
        <span className="tag text-white font-bold tracking-widest" style={{ opacity: pct }}>MASTERED ✓</span>
      </div>
      <div
        onClick={() => !dragging && Math.abs(offset) < 5 && onClick()}
        className="word-row relative bg-white flex items-center justify-between px-6 py-5 cursor-pointer hover:bg-slate-50 active:bg-slate-100 group"
        style={{ transform: `translateX(${offset}px)`, transition: dragging ? 'none' : 'transform 0.3s cubic-bezier(0.16,1,0.3,1)' }}
      >
        <div className="flex-1 min-w-0">
          <p className="text-xl font-black text-slate-900 leading-none mb-1 mono">{word.word}</p>
          <p className="text-sm text-slate-400 font-medium">{word.chinese}</p>
        </div>
        <div className="flex items-center gap-2 ml-4">
          {!isArchiveView && (
            <button onClick={e => { e.stopPropagation(); onArchive(word.id); }}
              className="p-2 rounded-full text-slate-200 hover:text-emerald-500 hover:bg-emerald-50 transition-all opacity-0 group-hover:opacity-100">
              <Icon name="check" size={18} />
            </button>
          )}
          <Icon name="chevronRight" size={16} className="text-slate-200" />
        </div>
      </div>
    </div>
  );
};

// ─── 主元件 ─────────────────────────────────────────────────
const App = () => {
  const [day, setDay]         = useState('Monday');
  const [tab, setTab]         = useState('feed');
  const [swiped, setSwiped]   = useState(new Set());
  const [progress, setProgress] = useState(0);
  const [detail, setDetail]   = useState(null);
  const [stats, setStats]     = useState(false);

  const words = useMemo(() => dailyData[day] || [], [day]);

  const skipCount = useMemo(() =>
    Math.floor((progress / 100) * words.length),
    [progress, words]);

  const archived = useMemo(() => {
    const s = new Set(swiped);
    for (let i = 0; i < skipCount; i++) if (words[i]) s.add(words[i].id);
    return s;
  }, [swiped, skipCount, words]);

  const feed = useMemo(() =>
    tab === 'archive'
      ? words.filter(w => archived.has(w.id))
      : words.slice(skipCount).filter(w => !swiped.has(w.id)),
    [words, archived, tab, skipCount, swiped]);

  const grouped = useMemo(() => {
    const out = []; let lastRoot = null;
    feed.forEach((w, i) => {
      if (w.rootId !== lastRoot) { out.push({ type: 'h', label: w.rootDesc, key: `h-${w.rootId}-${i}` }); lastRoot = w.rootId; }
      out.push({ type: 'w', data: w, key: w.id });
    });
    return out;
  }, [feed]);

  const reset = () => { setProgress(0); setSwiped(new Set()); setTab('feed'); };
  const switchDay = (d) => { setDay(d); reset(); };
  const mastPct = words.length ? Math.round((archived.size / words.length) * 100) : 0;

  return (
    <div className="min-h-screen bg-white text-black pb-52 select-none">

      {/* ── Header ─────────────────────────────────────────── */}
      <header className="sticky top-0 z-30 bg-white/95 backdrop-blur-md border-b border-slate-100">
        <div className="max-w-xl mx-auto px-4 pt-4 pb-2 overflow-x-auto no-scrollbar">
          <div className="flex gap-2 min-w-max">
            {Object.keys(dailyData).map(d => (
              <button key={d} onClick={() => switchDay(d)}
                className={`px-4 py-1.5 rounded-full tag font-bold transition-all ${
                  day === d ? 'bg-slate-900 text-white scale-105 shadow-lg' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'
                }`}>{d.toUpperCase()}</button>
            ))}
          </div>
        </div>
        <div className="flex justify-center gap-8 py-2.5 border-t border-slate-50">
          {[['feed','學習 Feed'], ['archive','已入庫']].map(([key, label]) => (
            <button key={key} onClick={() => setTab(key)}
              className={`text-xs font-black transition-all ${tab === key ? 'text-slate-900 underline underline-offset-4 decoration-2' : 'text-slate-300 hover:text-slate-400'}`}>
              {label} ({key === 'feed'
                ? (tab === 'feed' ? feed.length : words.length - archived.size)
                : archived.size})
            </button>
          ))}
        </div>
      </header>

      {/* ── List ───────────────────────────────────────────── */}
      <main className="max-w-xl mx-auto">
        {grouped.length > 0 ? grouped.map(item =>
          item.type === 'h'
            ? <div key={item.key} className="bg-slate-50 px-6 py-2.5 border-y border-slate-100 mt-3 first:mt-0">
                <span className="tag text-slate-400 uppercase">{item.label}</span>
              </div>
            : <WordRow key={item.key} word={item.data}
                onArchive={id => setSwiped(p => new Set([...p, id]))}
                onClick={() => setDetail(item.data)}
                isArchiveView={tab === 'archive'} />
        ) : (
          <div className="py-24 text-center px-10">
            <Icon name="layers" size={56} className="mx-auto mb-5 text-slate-100" />
            <p className="text-slate-300 font-bold mb-6 text-sm">
              {tab === 'feed' ? '這段已全部完成！' : '資料庫空空如也'}
            </p>
            <button onClick={reset}
              className="inline-flex items-center gap-2 px-6 py-3 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:scale-105 transition-transform">
              <Icon name="rotateCcw" size={16} /> 重新學習
            </button>
          </div>
        )}
      </main>

      {/* ── Bottom Nav ─────────────────────────────────────── */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white/97 backdrop-blur-xl border-t border-slate-100 px-6 pt-4 pb-8 z-40">
        <div className="max-w-xl mx-auto">
          <div className="flex justify-between items-end mb-3 px-1">
            <div>
              <p className="mono text-2xl font-bold text-slate-900 leading-none">{mastPct}<span className="text-base">%</span></p>
              <p className="tag text-slate-400 mt-0.5">總掌握進度</p>
            </div>
            <p className="tag text-indigo-500 font-bold">定位第 {skipCount + 1} 個</p>
          </div>
          <input type="range" min="0" max="100" value={progress}
            onChange={e => setProgress(+e.target.value)}
            className="w-full mb-4" />
          <div className="flex justify-around items-center">
            {[
              { icon: 'barChart',  label: '學習統計', action: () => setStats(true) },
              { icon: 'database',  label: '單字庫',   action: () => setTab('archive') },
              { icon: 'rotateCcw', label: '重設進度', action: reset },
            ].map(({ icon, label, action }) => (
              <button key={label} onClick={action}
                className="flex flex-col items-center gap-1 group text-slate-700 hover:text-indigo-600 transition-colors">
                <Icon name={icon} size={20} />
                <span className="tag">{label}</span>
              </button>
            ))}
          </div>
          <p className="text-center tag text-slate-300 mt-3">
            向左滑動 / 點擊 ✓ 標記為已掌握
          </p>
        </div>
      </nav>

      {/* ── Stats Modal ────────────────────────────────────── */}
      {stats && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
          <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setStats(false)} />
          <div className="relative w-full max-w-sm bg-white rounded-[2rem] p-8 shadow-2xl zoom-in">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-xl font-black mono">{day}</h3>
              <button onClick={() => setStats(false)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200">
                <Icon name="x" size={16} />
              </button>
            </div>
            <div className="space-y-3">
              {[
                { label: '本段總單字量', value: words.length, bg: 'bg-slate-50 border-slate-100', color: 'text-slate-900' },
                { label: '已掌握（含定位）', value: archived.size, bg: 'bg-emerald-50 border-emerald-100', color: 'text-emerald-700' },
                { label: '尚未學習', value: Math.max(0, words.length - archived.size), bg: 'bg-amber-50 border-amber-100', color: 'text-amber-700' },
              ].map(({ label, value, bg, color }) => (
                <div key={label} className={`${bg} border p-5 rounded-2xl flex justify-between items-center`}>
                  <p className="text-xs text-slate-400 font-bold">{label}</p>
                  <p className={`text-3xl font-black mono ${color}`}>{value}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── Detail Sheet ───────────────────────────────────── */}
      {detail && (
        <div className="fixed inset-0 z-50 flex items-end justify-center">
          <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setDetail(null)} />
          <div className="relative w-full max-w-xl bg-white rounded-t-[2.5rem] shadow-2xl p-10 slide-up max-h-[88vh] overflow-y-auto no-scrollbar">
            <div className="w-12 h-1 bg-slate-100 rounded-full mx-auto mb-8" />
            <p className="mono text-4xl font-black text-slate-900 mb-2">{detail.word}</p>
            <span className="inline-block bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full tag font-bold mb-3">{detail.rootId}</span>
            <p className="text-indigo-600 font-black text-lg mb-8">{detail.chinese}</p>
            <div className="space-y-6">
              <div>
                <p className="tag text-slate-300 mb-2">💡 記憶秘訣</p>
                <div className="bg-slate-50 border border-slate-100 rounded-2xl p-6 text-slate-700 font-medium leading-relaxed italic">{detail.memory}</div>
              </div>
              <div>
                <p className="tag text-slate-300 mb-2">使用例句</p>
                <p className="text-slate-600 text-lg leading-relaxed pl-4 border-l-4 border-indigo-100 italic">"{detail.example}"</p>
              </div>
              <button onClick={() => setDetail(null)}
                className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-base hover:bg-slate-800 active:scale-[0.98] transition-all">
                收起
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
